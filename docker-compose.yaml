version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: freelancehub_backend
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    container_name: freelancehub_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  db:
    image: postgres:14
    container_name: freelancehub_db
    restart: always
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_USER: frlnchub
      POSTGRES_PASSWORD: PasSStornG.312
      POSTGRES_DB: frlnchub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frlnchub"]
      interval: 5s
      retries: 5

volumes:
  postgres_data: